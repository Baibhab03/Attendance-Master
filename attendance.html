<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Attendance Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="attendance.css"> 
</head>

<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div id="sideNav" class="side-nav">
        <div class="nav-header">
            <div class="user-profile">
                <img src="https://placehold.co/50x50/00d2ff/ffffff?text=U" alt="User" id="sidebarAvatar">
                <div class="user-info">
                    <h4 id="profileName">Loading...</h4>
                    <p id="profileInfo">Connecting to cloud...</p>
                </div>
            </div>
            <button id="closeMenu" class="icon-btn"><i class='bx bx-chevron-left'></i></button>
        </div>

        <div class="nav-links">
            <a href="attendance.html" class="nav-link active"><i class='bx bxs-dashboard'></i> Dashboard</a>
            <a href="timetable.html" class="nav-link"><i class='bx bx-table'></i> Daily Timetable</a>
            <a href="history.html" class="nav-link"><i class='bx bx-history'></i> History</a>
            <a href="notification.html" class="nav-link"><i class='bx bx-bell'></i> Notifications <span class="badge" style="display:none;">0</span></a>
            <div class="nav-divider"></div>
            <a href="settings.html" class="nav-link"><i class='bx bx-cog'></i> Settings</a>
            <a href="account.html" class="nav-link"><i class='bx bx-user-circle'></i> Account</a>
        </div>

        <div class="nav-footer">
            <a href="#" class="nav-link logout-link" onclick="handleLogout()"><i class='bx bx-log-out'></i> Logout</a>
        </div>
    </div>
    <div id="navBackdrop" class="nav-backdrop"></div>

    <div class="glass-shell">
        <header class="header">
            <div class="logo-container">
                <button id="menuToggle" class="icon-btn menu-btn"><i class='bx bx-menu-alt-left'></i></button>
                <div class="logo-icon"><i class='bx bxs-graduation'></i></div>
                <h1 class="logo">Attendance <span>Master</span></h1>
            </div>
            <button id="addSubjectBtn" class="glass-btn primary"><i class='bx bx-plus'></i> <span class="hide-mobile">Add Subject</span></button>
        </header>

        <section class="stats-grid">
            <div class="glass-card stat-item">
                <div class="stat-header">
                    <h3>Overall Attendance</h3>
                    <i class='bx bx-pie-chart-alt-2'></i>
                </div>
                <div class="pct-display" id="overallPct">0%</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="overallBar"></div>
                </div>
            </div>
            <div class="glass-card stat-item">
                <div class="stat-header">
                    <h3>Total Subjects</h3>
                    <i class='bx bx-book-open'></i>
                </div>
                <div class="pct-display" id="todayCount">0</div>
                <p class="stat-subtitle">Currently tracking</p>
            </div>
        </section>

        <div class="nav-tabs">
            <button class="tab-btn active" data-tab="today"><i class='bx bx-calendar-check'></i> Today's Classes</button>
            <button class="tab-btn" data-tab="subjects"><i class='bx bx-list-ul'></i> Subject Stats</button>
        </div>

        <section id="tab-today" class="tab-content active">
            <div id="scheduleContainer" class="card-list">
                </div>
            
            <button class="glass-btn" onclick="openExtraClassModal()" style="width: 100%; margin-top: 15px; border-style: dashed; padding: 15px; color: var(--accent);">
                <i class='bx bx-plus-circle'></i> Add Extra Class For Today
            </button>
        </section>

        <section id="tab-subjects" class="tab-content">
            <div id="subjectsContainer" class="card-list"></div>
        </section>

        <div id="modalBackdrop" class="modal-backdrop">
            <div class="glass-card modal">
                <div class="modal-header">
                    <h3 id="modalTitle">Add New Subject</h3>
                    <button class="icon-btn" id="closeModalIcon"><i class='bx bx-x'></i></button>
                </div>
                <input type="hidden" id="editSubjectId">
                <div class="form-group">
                    <label>Subject Name</label>
                    <input type="text" id="subjectName" class="glass-input" placeholder="e.g. Operating Systems">
                </div>
                <div id="editFields" style="display: none;">
                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div class="form-group">
                            <label>Present</label>
                            <input type="number" id="editPresent" class="glass-input" min="0">
                        </div>
                        <div class="form-group">
                            <label>Total</label>
                            <input type="number" id="editTotal" class="glass-input" min="0">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Default Time</label>
                    <input type="time" id="subjectTime" class="glass-input">
                </div>
                <div class="modal-actions">
                    <button class="glass-btn secondary" id="closeModal">Cancel</button>
                    <button class="glass-btn primary" id="saveSubject">Save Changes</button>
                </div>
            </div>
        </div>

        <div id="extraClassModal" class="modal-backdrop">
            <div class="glass-card modal">
                <div class="modal-header">
                    <h3>Add Extra Class</h3>
                    <button class="icon-btn" onclick="closeExtraClassModal()"><i class='bx bx-x'></i></button>
                </div>
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0;">This class will only appear for today.</p>
                <div class="form-group">
                    <label>Select Subject</label>
                    <select id="extraSubjectSelect" class="glass-input"></select>
                </div>
                <div class="form-group">
                    <label>Class Time</label>
                    <input type="time" id="extraTimeInput" class="glass-input">
                </div>
                <div class="modal-actions">
                    <button class="glass-btn primary full-width" onclick="saveExtraClass()">Add to Today</button>
                </div>
            </div>
        </div>

    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="attendance.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Attendance Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="attendance.css">
    <link rel="stylesheet" href="history.css">
</head>

<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div id="sideNav" class="side-nav">
        <div class="nav-header">
           <div class="user-profile">
                <img src="https://placehold.co/50x50/00d2ff/ffffff?text=U" alt="User" id="sidebarAvatar">
                <div class="user-info">
                    <h4 id="profileName">Loading...</h4>
                    <p id="profileInfo">Roll: - | Sec: -</p>
                </div>
            </div>
            <button id="closeMenu" class="icon-btn"><i class='bx bx-chevron-left'></i></button>
        </div>

        <div class="nav-links">
            <a href="attendance.html" class="nav-link"><i class='bx bxs-dashboard'></i> Dashboard</a>
            <a href="timetable.html" class="nav-link"><i class='bx bx-table'></i> Daily Timetable</a>
            <a href="history.html" class="nav-link active"><i class='bx bx-history'></i> History</a>
            <a href="notification.html" class="nav-link"><i class='bx bx-bell'></i> Notifications <span class="badge"></span></a>
            <div class="nav-divider"></div>
            <a href="settings.html" class="nav-link"><i class='bx bx-cog'></i> Settings</a>
            <a href="account.html" class="nav-link"><i class='bx bx-user-circle'></i> Account</a>
        </div>

        <div class="nav-footer">
            <a href="signup.html" class="nav-link logout-link"><i class='bx bx-log-out'></i> Logout</a>
        </div>
    </div>
    <div id="navBackdrop" class="nav-backdrop"></div>

    <div class="glass-shell">
        <header class="header">
            <div class="logo-container">
                <button id="menuToggle" class="icon-btn menu-btn"><i class='bx bx-menu-alt-left'></i></button>
                <div class="logo-icon"><i class='bx bx-history'></i></div>
                <h1 class="logo">Activity <span>Log</span></h1>
            </div>
            <button class="glass-btn secondary" onclick="clearAllHistory()" style="color: var(--danger); border-color: var(--danger);">Clear All</button>
        </header>

        <div class="view-header">
            <h2>Recent Attendance</h2>
            <p>Delete a log to undo the action and recalculate your stats.</p>
        </div>

        <div id="historyContainer" class="card-list">
            </div>
    </div>

    <script src="attendance.js"></script>
</body>
</html>

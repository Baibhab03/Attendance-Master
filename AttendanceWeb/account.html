<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - Attendance Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="attendance.css">
    <link rel="stylesheet" href="account.css">
</head>

<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div id="sideNav" class="side-nav">
        <div class="nav-header">
            <div class="user-profile">
                <img src="https://placehold.co/50x50/00d2ff/ffffff?text=U" alt="User" id="sidebarAvatar">
                <div class="user-info">
                    <h4 id="profileName">Loading...</h4>
                    <p id="profileInfo">Roll: - | Sec: -</p>
                </div>
            </div>
            <button id="closeMenu" class="icon-btn"><i class='bx bx-chevron-left'></i></button>
        </div>
        <div class="nav-links">
            <a href="attendance.html" class="nav-link"><i class='bx bxs-dashboard'></i> Dashboard</a>
            <a href="timetable.html" class="nav-link"><i class='bx bx-table'></i> Daily Timetable</a>
            <a href="history.html" class="nav-link"><i class='bx bx-history'></i> History</a>
            <a href="notification.html" class="nav-link"><i class='bx bx-bell'></i> Notifications</a>
            <div class="nav-divider"></div>
            <a href="settings.html" class="nav-link"><i class='bx bx-cog'></i> Settings</a>
            <a href="account.html" class="nav-link active"><i class='bx bx-user-circle'></i> Account</a>
        </div>
        <div class="nav-footer"><a href="signup.html" class="nav-link logout-link"><i class='bx bx-log-out'></i>
                Logout</a></div>
    </div>
    <div id="navBackdrop" class="nav-backdrop"></div>

    <div class="glass-shell">
        <header class="header">
            <div class="logo-container">
                <button id="menuToggle" class="icon-btn menu-btn"><i class='bx bx-menu-alt-left'></i></button>
                <div class="logo-icon"><i class='bx bx-user'></i></div>
                <h1 class="logo">My <span>Profile</span></h1>
            </div>
        </header>

        <div class="profile-grid">
            <div class="id-card-container">
                <div class="student-id-card">
                    <div class="id-header">ATTENDANCE MASTER</div>
                    <div class="id-body">
                        <div class="avatar-wrapper">
                            <img src="https://placehold.co/120x120/00d2ff/ffffff?text=U" id="mainAvatarDisplay"
                                alt="Profile">
                            <div class="avatar-overlay" onclick="document.getElementById('avatarUpload').click()">
                                <i class='bx bx-camera'></i>
                            </div>
                            <input type="file" id="avatarUpload" accept="image/*" hidden>
                        </div>
                        <h3 id="idCardName">Student Name</h3>
                        <p id="idCardCourse" class="id-course">B.Tech - Semester 1</p>

                        <div class="id-details-grid">
                            <div class="id-detail-box">
                                <span>Roll No.</span>
                                <strong id="idCardRoll">--</strong>
                            </div>
                            <div class="id-detail-box">
                                <span>Section</span>
                                <strong id="idCardSec">--</strong>
                            </div>
                        </div>
                    </div>
                    <div class="id-footer">
                        <div class="id-reg-no" id="idCardRegNo">Reg No: --</div>
                    </div>
                </div>
            </div>

            <div class="profile-forms">
                <div class="glass-card">
                    <h3 class="form-section-title"><i class='bx bx-id-card'></i> Personal Information</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="profileInputName" class="glass-input"
                                oninput="updateIDCardRealtime()">
                        </div>
                        <div class="form-group">
                            <label>Contact Email</label>
                            <input type="email" id="profileInputEmail" class="glass-input"
                                placeholder="student@gmail.con">
                        </div>
                    </div>
                </div>

                <div class="glass-card" style="margin-top: 20px;">
                    <h3 class="form-section-title"><i class='bx bx-book-bookmark'></i> Academic Details</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Course / Program</label>
                            <input type="text" id="profileInputCourse" class="glass-input" placeholder="e.g. B.Tech CSE"
                                oninput="updateIDCardRealtime()">
                        </div>
                        <div class="form-group">
                            <label>Current Semester</label>
                            <select id="profileInputSem" class="glass-input" onchange="updateIDCardRealtime()">
                                <option value="1">Semester 1</option>
                                <option value="2">Semester 2</option>
                                <option value="3">Semester 3</option>
                                <option value="4">Semester 4</option>
                                <option value="5">Semester 5</option>
                                <option value="6">Semester 6</option>
                                <option value="7">Semester 7</option>
                                <option value="8">Semester 8</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Roll Number</label>
                            <input type="text" id="profileInputRoll" class="glass-input"
                                oninput="updateIDCardRealtime()">
                        </div>
                        <div class="form-group">
                            <label>Registration Number</label>
                            <input type="text" id="profileInputRegNo" class="glass-input" placeholder="e.g. REG2024001"
                                oninput="updateIDCardRealtime()">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Section / Batch</label>
                            <input type="text" id="profileInputSec" class="glass-input"
                                oninput="updateIDCardRealtime()">
                        </div>
                        <div></div>
                    </div>
                </div>

                <button class="glass-btn primary full-width" onclick="saveProfile()"
                    style="margin-top: 20px; padding: 15px; font-size: 1rem;"><i class='bx bx-save'></i> Save Profile
                    Changes</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="attendance.js"></script>
</body>

</html>

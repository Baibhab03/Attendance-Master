<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Attendance Master</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="stylesignup.css">
</head>

<body>
    <div class="background-overlay"></div>

    <div class="signup-container premium-glass-panel">
        <div class="header-section">
            <div class="logo-circle glow-pulse">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h2>Welcome Back!</h2>
            <p>Login to check your attendance and timetable.</p>
        </div>

        <div class="form-body">
            <form id="loginForm" novalidate>

                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" name="email" placeholder="Email" required />
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" name="password" placeholder="Password" required />
                    <span class="fas fa-eye-slash toggle-password-icon" id="toggleLoginPassword"></span>
                </div>

                <div class="auth-options-row">
                    <label class="remember-label">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <p class="error-message" id="loginError" style="display: none;"></p>

                <button type="submit" id="loginSubmitBtn" class="signup-btn shadow-glow">Login to Dashboard</button>

                <p class="login-link">Don't have an account? <a href="signup.html">Sign Up Here</a></p>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBE1dmuSIRa-_Ub7TgiE9ix9cVKYyt0pvE",
            authDomain: "attendance-master-ee26b.firebaseapp.com",
            projectId: "attendance-master-ee26b",
            storageBucket: "attendance-master-ee26b.firebasestorage.app",
            messagingSenderId: "784934726094",
            appId: "1:784934726094:web:002e6c14861d330b96e39f"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const errorMessage = document.getElementById('loginError');
            const passwordInput = document.getElementById('loginPassword');
            const togglePasswordIcon = document.getElementById('toggleLoginPassword');
            const submitBtn = document.getElementById('loginSubmitBtn');

            // Password Visibility Toggle
            togglePasswordIcon.addEventListener('click', () => {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    togglePasswordIcon.classList.replace('fa-eye-slash', 'fa-eye');
                } else {
                    passwordInput.type = 'password';
                    togglePasswordIcon.classList.replace('fa-eye', 'fa-eye-slash');
                }
            });

            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
                // Reset button if error
                submitBtn.innerHTML = 'Login to Dashboard';
                submitBtn.disabled = false;
            }

            // Form Submit Logic
            loginForm.addEventListener('submit', async (event) => {
                event.preventDefault();
                errorMessage.style.display = 'none';

                const email = document.getElementById('loginEmail').value.trim();
                const password = passwordInput.value;

                if (!email || !password) return showError('Please enter both email and password.');

                // UI Feedback: Show Loading State
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
                submitBtn.disabled = true;

                try {
                    // Firebase Auth
                    await auth.signInWithEmailAndPassword(email, password);
                    window.location.href = "attendance.html";
                } catch (error) {
                    console.error("Login Error:", error.code);
                    if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                        showError("Invalid email or password. Please try again.");
                    } else if (error.code === 'auth/network-request-failed') {
                        showError("Network error. Please check your internet connection.");
                    } else {
                        showError("An error occurred. Please try again later.");
                    }
                }
            });
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable - Attendance Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="attendance.css">
    <link rel="stylesheet" href="timetable.css">
</head>

<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div id="sideNav" class="side-nav">
        <div class="nav-header">
           <div class="user-profile">
                <img src="https://placehold.co/50x50/00d2ff/ffffff?text=U" alt="User" id="sidebarAvatar">
                <div class="user-info">
                    <h4 id="profileName">Loading...</h4>
                    <p id="profileInfo">Roll: - | Sec: -</p>
                </div>
            </div>
            <button id="closeMenu" class="icon-btn"><i class='bx bx-chevron-left'></i></button>
        </div>

        <div class="nav-links">
            <a href="attendance.html" class="nav-link"><i class='bx bxs-dashboard'></i> Dashboard</a>
            <a href="timetable.html" class="nav-link active"><i class='bx bx-table'></i> Daily Timetable</a>
            <a href="history.html" class="nav-link"><i class='bx bx-history'></i> History</a>
            <a href="notification.html" class="nav-link"><i class='bx bx-bell'></i> Notifications <span class="badge"></span></a>
            <div class="nav-divider"></div>
            <a href="settings.html" class="nav-link"><i class='bx bx-cog'></i> Settings</a>
            <a href="account.html" class="nav-link"><i class='bx bx-user-circle'></i> Account</a>
        </div>

        <div class="nav-footer">
            <a href="signup.html" class="nav-link logout-link"><i class='bx bx-log-out'></i> Logout</a>
        </div>
    </div>
    <div id="navBackdrop" class="nav-backdrop"></div>

    <div class="glass-shell">
        <header class="header">
            <div class="logo-container">
                <button id="menuToggle" class="icon-btn menu-btn"><i class='bx bx-menu-alt-left'></i></button>
                <div class="logo-icon"><i class='bx bx-table'></i></div>
                <h1 class="logo">Daily <span>Timetable</span></h1>
            </div>
        </header>

        <div class="view-header">
            <h2>Weekly Schedule</h2>
            <p>Map your subjects to specific days.</p>
        </div>

        <div class="day-selector">
            <button class="day-btn active" data-day="Monday">Mon</button>
            <button class="day-btn" data-day="Tuesday">Tue</button>
            <button class="day-btn" data-day="Wednesday">Wed</button>
            <button class="day-btn" data-day="Thursday">Thu</button>
            <button class="day-btn" data-day="Friday">Fri</button>
            <button class="day-btn" data-day="Saturday">Sat</button>
        </div>

        <div id="timetableList" class="card-list">
            </div>

        <button id="addTimetableSlotBtn" class="glass-btn primary full-width" style="margin-top: 20px;">
            <i class='bx bx-plus'></i> Add Class to <span id="currentDayText">Monday</span>
        </button>

        <div id="slotModalBackdrop" class="modal-backdrop">
            <div class="glass-card modal">
                <div class="modal-header">
                    <h3>Add to Timetable</h3>
                    <button class="icon-btn" id="closeSlotModal"><i class='bx bx-x'></i></button>
                </div>
                <div class="form-group">
                    <label>Select Subject</label>
                    <select id="slotSubjectSelect" class="glass-input">
                        </select>
                </div>
                <div class="form-group">
                    <label>Class Time</label>
                    <input type="time" id="slotTimeInput" class="glass-input">
                </div>
                <div class="modal-actions">
                    <button class="glass-btn primary full-width" id="saveSlotBtn">Add to Schedule</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="attendance.js"></script>
</body>
</html>

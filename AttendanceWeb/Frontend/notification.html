<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts - Attendance Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="attendance.css">
    <link rel="stylesheet" href="notification.css">
</head>
<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="glass-shell">
        <header class="header">
            <div class="logo-container">
                <!-- <button id="menuToggle" class="icon-btn menu-btn"><i class='bx bx-menu-alt-left'></i></button> -->
                <div class="logo-icon"><i class='bx bx-bell'></i></div> 
                <h1 class="logo">Smart <span>Alerts</span></h1>
            </div>
        </header>

        <div class="utility-bar">
            <span class="utility-text" id="alertCountText">Scanning subjects...</span>
            <div style="display:flex; gap: 10px;">
                <button class="glass-btn text-btn" onclick="dismissAllAlerts()" style="color: var(--text-muted); border-color: var(--glass-border);">Dismiss All</button>
                <button class="icon-btn" onclick="refreshAllUI()" title="Refresh"><i class='bx bx-refresh'></i></button>
            </div>
        </div>

        <div id="notificationsList" class="card-list">
            </div>
    </div>
    <script src="attendance.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Attendance Master</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="stylesignup.css">
</head>

<body>
    <div class="background-overlay"></div>

    <div class="signup-container premium-glass-panel">
        <div class="header-section">
            <div class="logo-circle glow-pulse">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h2>Student Sign Up</h2>
            <p>Track classes, manage timetables, and stay above 75%.</p>
        </div>

        <div class="form-body">
            <form id="signupForm" novalidate>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="fullName" name="fullName" placeholder="Full Name" required />
                </div>

                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="Email" required />
                </div>

                <div class="input-group">
                    <i class="fas fa-id-badge"></i>
                    <input type="text" id="roll" name="roll" placeholder="Roll Number / Student ID" required />
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Create Password" required />
                    <span class="fas fa-eye-slash toggle-password-icon" id="togglePassword"></span>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password"
                        required />
                    <span class="fas fa-eye-slash toggle-password-icon" id="toggleConfirmPassword"></span>
                </div>

                <p class="error-message" id="signupError" style="display: none;"></p>

                <button type="submit" id="signupSubmitBtn" class="signup-btn shadow-glow">Create Account</button>

                <p class="login-link">Already have an account? <a href="login.html">Login Here</a></p>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBE1dmuSIRa-_Ub7TgiE9ix9cVKYyt0pvE",
            authDomain: "attendance-master-ee26b.firebaseapp.com",
            projectId: "attendance-master-ee26b",
            storageBucket: "attendance-master-ee26b.firebasestorage.app",
            messagingSenderId: "784934726094",
            appId: "1:784934726094:web:002e6c14861d330b96e39f"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        document.addEventListener('DOMContentLoaded', () => {
            const signupForm = document.getElementById('signupForm');
            const errorMessage = document.getElementById('signupError');
            const passwordInput = document.getElementById('password');
            const togglePasswordIcon = document.getElementById('togglePassword');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const toggleConfirmPasswordIcon = document.getElementById('toggleConfirmPassword');
            const submitBtn = document.getElementById('signupSubmitBtn');

            function toggleVisibility(input, icon) {
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                } else {
                    input.type = 'password';
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                }
            }

            togglePasswordIcon.addEventListener('click', () => toggleVisibility(passwordInput, togglePasswordIcon));
            toggleConfirmPasswordIcon.addEventListener('click', () => toggleVisibility(confirmPasswordInput, toggleConfirmPasswordIcon));

            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
                submitBtn.innerHTML = 'Create Account';
                submitBtn.disabled = false;
            }

            signupForm.addEventListener('submit', async (event) => {
                event.preventDefault();
                errorMessage.style.display = 'none';

                const fullName = document.getElementById('fullName').value.trim();
                const email = document.getElementById('email').value.trim();
                const roll = document.getElementById('roll').value.trim();
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                if (!fullName || !email || !roll || !password || !confirmPassword) return showError('Please fill out all fields.');
                if (password.length < 8) return showError('Password must be at least 8 characters long.');
                if (password !== confirmPassword) return showError('Passwords do not match.');

                // UI Feedback: Show Loading State
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
                submitBtn.disabled = true;

                try {
                    // 1. Create User in Firebase Auth
                    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                    const user = userCredential.user;

                    // 2. Create User Profile in Firestore Database (PRO: Includes default preferences)
                    await db.collection("users").doc(user.uid).set({
                        userProfile: {
                            name: fullName, roll: roll, sec: "", course: "", sem: "", regNo: "", avatar: "https://placehold.co/120x120/00d2ff/ffffff?text=U", email: email
                        },
                        preferences: {
                            targetPct: 75,
                            alerts: true,
                            predictive: true,
                            autoMark: true,
                            autoDelete: "never"
                        },
                        subjects: [],
                        timetable: { Monday: [], Tuesday: [], Wednesday: [], Thursday: [], Friday: [], Saturday: [] },
                        historyLog: [],
                        overrides: {}
                    });

                    // 3. Success Feedback
                    submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> Success! Redirecting...';
                    submitBtn.style.background = '#2ecc71';

                    setTimeout(() => {
                        window.location.href = "account.html?newuser=true";
                    }, 1000);

                } catch (error) {
                    showError(error.message);
                }
            });
        });
    </script>
</body>

</html>

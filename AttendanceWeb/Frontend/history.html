<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Attendance Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="attendance.css">
    <link rel="stylesheet" href="history.css">
</head>
<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="floating-nav-wrapper">
        <nav class="main-nav-pill">
            <a href="timetable.html" class="nav-item">
                <div class="nav-icon"><i class='bx bx-table'></i></div>
                <!-- <span class="nav-label">Timetable</span> -->
            </a>
            <a href="attendance.html" class="nav-item">
                <div class="nav-icon"><i class='bx bxs-home'></i></div>
                <!-- <span class="nav-label">Home</span> -->
            </a>
            <a href="history.html" class="nav-item active">
                <div class="nav-icon "><i class='bx bx-history'></i></div>
                <!-- <span class="nav-label">History</span> -->
            </a>
        </nav>
        <a href="account.html" class="detached-account-btn">
            <img src="https://placehold.co/50x50/00d2ff/ffffff?text=U" id="bottomNavAvatar" alt="Profile">
        </a>
    </div>

    <div class="glass-shell">
        <header class="header">
            <div class="logo-container">
                <div class="logo-icon"><i class='bx bx-history'></i></div>
                <h1 class="logo">Activity <span>Log</span></h1>
            </div>
            <button class="glass-btn secondary text-btn clear-history-btn" onclick="clearAllHistory()">
                <i class='bx bx-trash'></i> Clear All
            </button>
        </header>

        <div class="nav-tabs">
            <button class="tab-btn active" data-tab="list"><i class='bx bx-list-ul'></i> List View</button>
            <button class="tab-btn" data-tab="calendar"><i class='bx bx-calendar'></i> Calendar View</button>
        </div>

        <section id="tab-list" class="tab-content active">
            <div id="historyContainer" class="card-list compact-history-list">
                </div>
        </section>

        <section id="tab-calendar" class="tab-content">
            <div class="glass-card calendar-card">
                <div class="calendar-header-nav">
                    <button class="icon-btn" id="prevMonthBtn"><i class='bx bx-chevron-left'></i></button>
                    <h3 id="calendarMonthDisplay">Month Year</h3>
                    <button class="icon-btn" id="nextMonthBtn"><i class='bx bx-chevron-right'></i></button>
                </div>
                <div class="calendar-container">
                    <div class="calendar-days-header">
                        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
                    </div>
                    <div id="calendarGrid" class="calendar-grid"></div>
                </div>
                <div class="calendar-legend">
                    <span class="legend-item"><div class="legend-dot present-dot"></div> Present</span>
                    <span class="legend-item"><div class="legend-dot absent-dot"></div> Absent</span>
                </div>
            </div>
        </section>
    </div>
    <script src="attendance.js"></script>
</body>
</html>
